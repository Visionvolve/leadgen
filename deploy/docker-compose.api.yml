# Additive compose file for leadgen API
# Usage: docker compose -f docker-compose.yml ... -f docker-compose.api.yml up -d
services:
  leadgen-api:
    image: ghcr.io/michallicko/leadgen-pipeline:latest
    container_name: leadgen-api
    environment:
      - DATABASE_URL=${LEADGEN_DATABASE_URL}
      - JWT_SECRET_KEY=${LEADGEN_JWT_SECRET}
      - CORS_ORIGINS=https://leadgen.visionvolve.com
      - N8N_BASE_URL=http://n8n:5678
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://leadgen.visionvolve.com/api/oauth/google/callback
      - OAUTH_ENCRYPTION_KEY=${OAUTH_ENCRYPTION_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-leadgen-pipeline}
      - IAM_BASE_URL=${IAM_BASE_URL:-https://iam.visionvolve.com}
      - IAM_JWKS_URL=${IAM_JWKS_URL:-https://iam.visionvolve.com/.well-known/jwks.json}
      - IAM_AUDIENCE=${IAM_AUDIENCE:-leadgen}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET:-}
      # Phase 4 (Agent Z5): UA microsite integration. Required for
      # send_service.get_or_create_invite + scripts/backfill_eventfest_tokens.py.
      # Without these, EventFest partner tokens never get populated on
      # campaign_contacts, so tracking-ingest campaign attribution fails.
      - UA_MICROSITE_URL=${UA_MICROSITE_URL:-https://booking.loserscirque.cz}
      - UA_INVITE_API_KEY=${UA_INVITE_API_KEY:-}
      # BL-1200: AITransformers contact sync — `flask sync-aitransformers`
      # invoked by cron (.github/workflows/aitransformers-sync.yml).
      # AITRANSFORMERS_ADMIN_TOKEN is required for the sync to run; the
      # other variables fall back to the defaults in
      # api/jobs/aitransformers_contact_sync.py.
      - AITRANSFORMERS_API_URL=${AITRANSFORMERS_API_URL:-https://app.aitransformers.eu/api}
      - AITRANSFORMERS_ADMIN_TOKEN=${AITRANSFORMERS_ADMIN_TOKEN:-}
      - LEADGEN_AITRANSFORMERS_TENANT_SLUG=${LEADGEN_AITRANSFORMERS_TENANT_SLUG:-visionvolve}
      - LEADGEN_AITRANSFORMERS_BATCH_SIZE=${LEADGEN_AITRANSFORMERS_BATCH_SIZE:-200}
      - LEADGEN_AITRANSFORMERS_TAG_NAME=${LEADGEN_AITRANSFORMERS_TAG_NAME:-AITransformers}
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
