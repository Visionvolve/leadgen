name: Resend reconcile (daily)

# Backfills Resend engagement timestamps (opened_at / clicked_at / ...) on
# email_send_log rows whose webhook never fired. Runs the
# `flask reconcile-resend` CLI on the staging or production API container.
#
# Automation is scaffolded but not yet wired: this workflow is currently
# manual-dispatch only. Once we're satisfied with the reconciler's
# behaviour in staging, flip the `schedule:` block on and wire the actual
# SSH/ECS step for the target environment.
#
# See `api/jobs/resend_reconciler.py` and `api/cli/reconcile.py` for the
# underlying job. BL-1045.

on:
  # schedule:
  #   - cron: '0 2 * * *'   # 02:00 UTC daily - enable after staging soak
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging|production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      window_days:
        description: 'Lookback window in days'
        required: false
        default: '30'
      batch_limit:
        description: 'Max rows per tenant'
        required: false
        default: '100'

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Print run parameters
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          WINDOW_DAYS: ${{ inputs.window_days }}
          BATCH_LIMIT: ${{ inputs.batch_limit }}
        run: |
          echo "Environment: $ENVIRONMENT"
          echo "Window days: $WINDOW_DAYS"
          echo "Batch limit: $BATCH_LIMIT"

      # TODO (BL-1045 follow-up): wire the actual invocation. The two
      # viable paths are:
      #
      #   1. SSH to the target VPS and exec the flask CLI inside the API
      #      container, e.g.:
      #
      #         docker exec leadgen-api flask reconcile-resend \
      #           --window-days "$WINDOW_DAYS" --batch-limit "$BATCH_LIMIT"
      #
      #   2. Exec via AWS SSM Run Command against the API host.
      #
      # Both require secrets (SSH key or AWS creds) that we haven't wired
      # through to this workflow yet. Keeping the job as a manual stub
      # documents the intent without silently failing on cron.
      - name: Placeholder - not yet automated
        env:
          WINDOW_DAYS: ${{ inputs.window_days }}
          BATCH_LIMIT: ${{ inputs.batch_limit }}
        run: |
          echo "Manual runs are a no-op stub. Exec the CLI directly on the target host:"
          echo "  docker exec leadgen-api flask reconcile-resend \\"
          echo "    --window-days $WINDOW_DAYS --batch-limit $BATCH_LIMIT"
