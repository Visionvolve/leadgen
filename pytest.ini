[pytest]
# testmon: run locally with `pytest --testmon` for incremental test selection
# CI uses `-p no:testmon` but addopts can't include --testmon without the plugin installed

markers =
    enrichment: enrichment node tests (real API calls)
    slow: tests that take >10s (synthesis nodes)
    costly: tests with multiple API calls
    live_api: hits a live external API (skipped by default; opt-in with -m live_api)

# Skip live_api tests unless explicitly opted into.
addopts = -m "not live_api"
